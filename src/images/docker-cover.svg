<svg xmlns="http://www.w3.org/2000/svg" width="600" height="315" viewBox="0 0 600 315">
  <!-- Background -->
  <rect width="600" height="315" fill="#1a1a2e"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="315" fill="#2496ed"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="105" x2="600" y2="105" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="210" x2="600" y2="210" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="315" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="315" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Docker logo: stacked container boxes -->
  <rect x="72" y="118" width="22" height="16" rx="2" fill="#2496ed" opacity="0.9"/>
  <rect x="98" y="118" width="22" height="16" rx="2" fill="#2496ed" opacity="0.9"/>
  <rect x="72" y="138" width="22" height="16" rx="2" fill="#2496ed" opacity="0.9"/>
  <rect x="98" y="138" width="22" height="16" rx="2" fill="#2496ed" opacity="0.9"/>
  <rect x="124" y="138" width="22" height="16" rx="2" fill="#2496ed" opacity="0.9"/>
  <rect x="46" y="158" width="22" height="16" rx="2" fill="#2496ed" opacity="0.9"/>
  <rect x="72" y="158" width="22" height="16" rx="2" fill="#2496ed" opacity="0.9"/>
  <rect x="98" y="158" width="22" height="16" rx="2" fill="#2496ed" opacity="0.9"/>
  <rect x="124" y="158" width="22" height="16" rx="2" fill="#2496ed" opacity="0.9"/>
  <rect x="150" y="158" width="22" height="16" rx="2" fill="#2496ed" opacity="0.9"/>
  <!-- Whale base line -->
  <path d="M38,178 Q100,195 175,178" fill="none" stroke="#2496ed" stroke-width="3" opacity="0.7"/>
  <!-- Whale tail -->
  <path d="M165,178 Q185,165 190,175 Q185,185 175,178" fill="#2496ed" opacity="0.7"/>

  <!-- Main title -->
  <text x="230" y="130" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Docker for</text>
  <text x="230" y="172" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Java Developers</text>

  <!-- Subtitle -->
  <text x="230" y="210" font-family="Arial, sans-serif" font-size="15" fill="#a0a0b0">Build · Ship · Run</text>

  <!-- Tags -->
  <rect x="230" y="230" width="55" height="24" rx="4" fill="#2496ed" opacity="0.9"/>
  <text x="257" y="247" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Docker</text>

  <rect x="295" y="230" width="55" height="24" rx="4" fill="#16213e" stroke="#2496ed" stroke-width="1" opacity="0.9"/>
  <text x="322" y="247" font-family="Arial, sans-serif" font-size="12" fill="#2496ed" text-anchor="middle">Java</text>

  <rect x="360" y="230" width="65" height="24" rx="4" fill="#16213e" stroke="#2496ed" stroke-width="1" opacity="0.9"/>
  <text x="392" y="247" font-family="Arial, sans-serif" font-size="12" fill="#2496ed" text-anchor="middle">DevOps</text>
</svg>
