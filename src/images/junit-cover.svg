<svg xmlns="http://www.w3.org/2000/svg" width="600" height="315" viewBox="0 0 600 315">
  <!-- Background -->
  <rect width="600" height="315" fill="#1a1a2e"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="315" fill="#4dabf7"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="105" x2="600" y2="105" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="210" x2="600" y2="210" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="315" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="315" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- JUnit logo: circle with checkmark -->
  <circle cx="120" cy="157" r="60" fill="none" stroke="#4dabf7" stroke-width="3" opacity="0.8"/>
  <circle cx="120" cy="157" r="45" fill="#4dabf7" opacity="0.1"/>
  <!-- Checkmark -->
  <polyline points="95,157 112,174 148,138" fill="none" stroke="#4dabf7" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main title -->
  <text x="230" y="130" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Getting Started</text>
  <text x="230" y="172" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">with JUnit 5</text>

  <!-- Subtitle -->
  <text x="230" y="210" font-family="Arial, sans-serif" font-size="15" fill="#a0a0b0">Java Unit Testing Framework</text>

  <!-- Tags -->
  <rect x="230" y="230" width="55" height="24" rx="4" fill="#4dabf7" opacity="0.9"/>
  <text x="257" y="247" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Java</text>

  <rect x="295" y="230" width="65" height="24" rx="4" fill="#16213e" stroke="#4dabf7" stroke-width="1" opacity="0.9"/>
  <text x="327" y="247" font-family="Arial, sans-serif" font-size="12" fill="#4dabf7" text-anchor="middle">JUnit 5</text>

  <rect x="370" y="230" width="70" height="24" rx="4" fill="#16213e" stroke="#4dabf7" stroke-width="1" opacity="0.9"/>
  <text x="405" y="247" font-family="Arial, sans-serif" font-size="12" fill="#4dabf7" text-anchor="middle">Testing</text>
</svg>
