<svg xmlns="http://www.w3.org/2000/svg" width="600" height="315" viewBox="0 0 600 315">
  <!-- Background -->
  <rect width="600" height="315" fill="#1a1a2e"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="315" fill="#f4a261"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="105" x2="600" y2="105" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="210" x2="600" y2="210" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="315" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="315" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Kafka logo: broker nodes + lines -->
  <circle cx="120" cy="110" r="18" fill="#f4a261" opacity="0.9"/>
  <circle cx="120" cy="157" r="18" fill="#f4a261" opacity="0.9"/>
  <circle cx="120" cy="204" r="18" fill="#f4a261" opacity="0.9"/>
  <!-- Producer node -->
  <circle cx="60" cy="157" r="14" fill="none" stroke="#f4a261" stroke-width="2" opacity="0.7"/>
  <text x="60" y="162" font-family="monospace" font-size="9" fill="#f4a261" text-anchor="middle">P</text>
  <!-- Consumer nodes -->
  <circle cx="180" cy="120" r="14" fill="none" stroke="#f4a261" stroke-width="2" opacity="0.7"/>
  <text x="180" y="125" font-family="monospace" font-size="9" fill="#f4a261" text-anchor="middle">C</text>
  <circle cx="180" cy="194" r="14" fill="none" stroke="#f4a261" stroke-width="2" opacity="0.7"/>
  <text x="180" y="199" font-family="monospace" font-size="9" fill="#f4a261" text-anchor="middle">C</text>
  <!-- Connecting lines -->
  <line x1="74" y1="157" x2="102" y2="120" stroke="#f4a261" stroke-width="1.5" opacity="0.5"/>
  <line x1="74" y1="157" x2="102" y2="157" stroke="#f4a261" stroke-width="1.5" opacity="0.5"/>
  <line x1="74" y1="157" x2="102" y2="194" stroke="#f4a261" stroke-width="1.5" opacity="0.5"/>
  <line x1="138" y1="120" x2="166" y2="120" stroke="#f4a261" stroke-width="1.5" opacity="0.5"/>
  <line x1="138" y1="157" x2="166" y2="120" stroke="#f4a261" stroke-width="1.5" opacity="0.5"/>
  <line x1="138" y1="157" x2="166" y2="194" stroke="#f4a261" stroke-width="1.5" opacity="0.5"/>
  <line x1="138" y1="194" x2="166" y2="194" stroke="#f4a261" stroke-width="1.5" opacity="0.5"/>

  <!-- Main title -->
  <text x="230" y="130" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Apache Kafka</text>
  <text x="230" y="172" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Fundamentals</text>

  <!-- Subtitle -->
  <text x="230" y="210" font-family="Arial, sans-serif" font-size="15" fill="#a0a0b0">Distributed Event Streaming</text>

  <!-- Tags -->
  <rect x="230" y="230" width="60" height="24" rx="4" fill="#f4a261" opacity="0.9"/>
  <text x="260" y="247" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Kafka</text>

  <rect x="300" y="230" width="130" height="24" rx="4" fill="#16213e" stroke="#f4a261" stroke-width="1" opacity="0.9"/>
  <text x="365" y="247" font-family="Arial, sans-serif" font-size="12" fill="#f4a261" text-anchor="middle">Distributed Systems</text>

  <rect x="440" y="230" width="55" height="24" rx="4" fill="#16213e" stroke="#f4a261" stroke-width="1" opacity="0.9"/>
  <text x="467" y="247" font-family="Arial, sans-serif" font-size="12" fill="#f4a261" text-anchor="middle">Java</text>
</svg>
