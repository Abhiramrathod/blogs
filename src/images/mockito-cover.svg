<svg xmlns="http://www.w3.org/2000/svg" width="600" height="315" viewBox="0 0 600 315">
  <!-- Background -->
  <rect width="600" height="315" fill="#1a1a2e"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="315" fill="#00c853"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="105" x2="600" y2="105" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="210" x2="600" y2="210" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="315" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="315" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Mockito logo: Mock object with connections -->
  <circle cx="120" cy="157" r="60" fill="none" stroke="#00c853" stroke-width="3" opacity="0.8"/>
  <circle cx="120" cy="157" r="45" fill="#00c853" opacity="0.1"/>
  
  <!-- Mock symbol: M -->
  <text x="120" y="175" font-family="monospace" font-size="48" font-weight="bold" fill="#00c853" text-anchor="middle">M</text>
  
  <!-- Connection nodes -->
  <circle cx="60" cy="120" r="8" fill="#00c853" opacity="0.7"/>
  <circle cx="60" cy="194" r="8" fill="#00c853" opacity="0.7"/>
  <circle cx="180" cy="120" r="8" fill="#00c853" opacity="0.7"/>
  <circle cx="180" cy="194" r="8" fill="#00c853" opacity="0.7"/>
  
  <!-- Connection lines -->
  <line x1="68" y1="120" x2="80" y2="135" stroke="#00c853" stroke-width="1.5" opacity="0.5"/>
  <line x1="68" y1="194" x2="80" y2="179" stroke="#00c853" stroke-width="1.5" opacity="0.5"/>
  <line x1="172" y1="120" x2="160" y2="135" stroke="#00c853" stroke-width="1.5" opacity="0.5"/>
  <line x1="172" y1="194" x2="160" y2="179" stroke="#00c853" stroke-width="1.5" opacity="0.5"/>

  <!-- Main title -->
  <text x="230" y="130" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Mastering</text>
  <text x="230" y="172" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">Mockito</text>

  <!-- Subtitle -->
  <text x="230" y="210" font-family="Arial, sans-serif" font-size="15" fill="#a0a0b0">Mock · Stub · Verify</text>

  <!-- Tags -->
  <rect x="230" y="230" width="70" height="24" rx="4" fill="#00c853" opacity="0.9"/>
  <text x="265" y="247" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Mockito</text>

  <rect x="310" y="230" width="55" height="24" rx="4" fill="#16213e" stroke="#00c853" stroke-width="1" opacity="0.9"/>
  <text x="337" y="247" font-family="Arial, sans-serif" font-size="12" fill="#00c853" text-anchor="middle">Java</text>

  <rect x="375" y="230" width="70" height="24" rx="4" fill="#16213e" stroke="#00c853" stroke-width="1" opacity="0.9"/>
  <text x="410" y="247" font-family="Arial, sans-serif" font-size="12" fill="#00c853" text-anchor="middle">Testing</text>
</svg>
