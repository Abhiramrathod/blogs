<svg xmlns="http://www.w3.org/2000/svg" width="600" height="315" viewBox="0 0 600 315">
  <!-- Background -->
  <rect width="600" height="315" fill="#1a1a2e"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="315" fill="#6abf69"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="105" x2="600" y2="105" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="210" x2="600" y2="210" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="315" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="315" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Spring Boot logo: leaf shape -->
  <circle cx="120" cy="157" r="60" fill="none" stroke="#6abf69" stroke-width="3" opacity="0.8"/>
  <circle cx="120" cy="157" r="45" fill="#6abf69" opacity="0.1"/>
  <!-- Leaf / spring symbol -->
  <path d="M100,175 Q95,140 125,130 Q155,120 145,155 Q140,175 120,178 Q105,180 100,175 Z"
        fill="#6abf69" opacity="0.85"/>
  <path d="M108,172 Q118,148 138,142" fill="none" stroke="#1a1a2e" stroke-width="2" opacity="0.7"/>

  <!-- Main title -->
  <text x="230" y="120" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#ffffff">Getting Started</text>
  <text x="230" y="160" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#ffffff">with Spring Boot</text>
  <text x="230" y="196" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#6abf69">Microservices</text>

  <!-- Subtitle -->
  <text x="230" y="220" font-family="Arial, sans-serif" font-size="14" fill="#a0a0b0">Build · Deploy · Scale</text>

  <!-- Tags -->
  <rect x="230" y="238" width="55" height="24" rx="4" fill="#6abf69" opacity="0.9"/>
  <text x="257" y="255" font-family="Arial, sans-serif" font-size="12" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Java</text>

  <rect x="295" y="238" width="100" height="24" rx="4" fill="#16213e" stroke="#6abf69" stroke-width="1" opacity="0.9"/>
  <text x="345" y="255" font-family="Arial, sans-serif" font-size="12" fill="#6abf69" text-anchor="middle">Spring Boot</text>

  <rect x="405" y="238" width="105" height="24" rx="4" fill="#16213e" stroke="#6abf69" stroke-width="1" opacity="0.9"/>
  <text x="457" y="255" font-family="Arial, sans-serif" font-size="12" fill="#6abf69" text-anchor="middle">Microservices</text>
</svg>
